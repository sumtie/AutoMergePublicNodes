name: Daily Update

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  spider-and-generate:
    runs-on: ubuntu-latest

    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 5

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run freefq spider
        run: python web_freefq.py

      # ==================== 检查 v2.txt 是否有变化 ====================
      - name: Check for changes in v2.txt
        id: git-check
        run: |
          git diff --quiet HEAD -- v2.txt || echo "changed=true" >> $GITHUB_OUTPUT

      # ==================== 如果有变化则提交 ====================
      - name: Commit and push updates (Shanghai time)
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          SH_TIME=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')

          git add v2.txt
          git commit -m "Daily update: ${SH_TIME} (v2.txt)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==================== Job 总结 ====================
      - name: Job summary
        run: |
          echo "=== Daily Update Job Completed ==="
          if [ "${{ steps.git-check.outputs.changed }}" = "true" ]; then
            echo "✅ 新节点已更新！已提交 v2.txt"
            echo "更新时间（上海时间）：$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"
          else
            echo "ℹ️ 今天节点无变化，无需提交"
          fi
